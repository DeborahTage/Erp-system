spring.application.name=trust-agro-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trust_agro_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=TrustAgroSecretKey2024VeryLongSecretKeyForJWTSigning
app.jwt.expiration=86400000

# Server
server.port=${SERVER_PORT:8080}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Alerts
app.alerts.mortality-threshold=5.0
app.alerts.expiry-warning-days=30
