# Persist local data on disk so created users and records remain after backend restarts.
# Use an absolute workspace path so launching the app from a different working directory
# still points to the same database file.
spring.datasource.url=jdbc:h2:file:C:/Users/Hp/Desktop/Project ERP/backend/data/trust_agro_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
server.port=8082

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
